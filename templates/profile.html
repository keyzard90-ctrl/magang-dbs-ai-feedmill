<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - AI Feedmill System</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { --bg-dark: #0f172a; --theme-color: #3b82f6; --text-main: #f8fafc; --text-secondary: #94a3b8; --card-bg: rgba(30, 41, 59, 0.7); --card-border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Inter', sans-serif; color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .bg-animation { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #020617, #0f172a, #1e1b4b, #0f172a); background-size: 400% 400%; animation: gradientBG 20s ease infinite; z-index: -1; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .top-navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(10px); border-bottom: 1px solid var(--card-border); z-index: 10; }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .nav-left i { font-size: 32px; color: var(--theme-color); }
        .nav-left h2 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: 1px; }

        .main-container { padding: 50px; display: flex; justify-content: center; align-items: center; height: calc(100vh - 75px); }
        .glass-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 40px; backdrop-filter: blur(16px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 500px; text-align: center; }
        
        .avatar-lg { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(45deg, #3b82f6, #8b5cf6); margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .profile-name { font-size: 24px; font-weight: 700; margin: 0 0 5px 0; }
        .profile-role { color: var(--theme-color); font-size: 14px; font-weight: 600; margin: 0 0 30px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 15px; text-align: left; margin-bottom: 40px; }
        .info-item { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); padding: 15px 20px; border-radius: 10px; display: flex; align-items: center; gap: 15px; }
        .info-item i { font-size: 24px; color: var(--text-secondary); }
        .info-item div { display: flex; flex-direction: column; }
        .info-item .lbl { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
        .info-item .val { font-size: 15px; font-weight: 600; }

        .btn-back { background: transparent; color: var(--text-main); border: 1px solid var(--card-border); padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-back:hover { background: rgba(255,255,255,0.05); border-color: var(--theme-color); color: var(--theme-color); }
    </style>
    <style>
        body { opacity: 0; transition: opacity 0.5s ease-in; }
        body.loaded { opacity: 1; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <header class="top-navbar">
        <div class="nav-left">
            <i class="ph-fill ph-aperture"></i>
            <h2>Enterprise Feedmill</h2>
        </div>
    </header>
    <div class="main-container">
        <div class="glass-card">
            <div class="avatar-lg">K</div>
            <h1 class="profile-name">Key</h1>
            <p class="profile-role">Superintendent - Area Feedmill</p>
            
            <div class="info-grid">
                <div class="info-item">
                    <i class="ph-fill ph-user"></i>
                    <div><span class="lbl">Username</span><span class="val">keyganteng</span></div>
                </div>
                <div class="info-item">
                    <i class="ph-fill ph-envelope-simple"></i>
                    <div><span class="lbl">Email</span><span class="val">keyzard90@gmail.com</span></div>
                </div>
                <div class="info-item">
                    <i class="ph-fill ph-shield-check"></i>
                    <div><span class="lbl">Access Level</span><span class="val">Administrator (Full Access)</span></div>
                </div>
            </div>
            
            <a href="/" class="btn-back"><i class="ph-bold ph-arrow-left"></i> Kembali ke Dashboard</a>
        </div>
    </div>
    <script>window.addEventListener("load", () => document.body.classList.add("loaded"));</script>
</body>
</html>
