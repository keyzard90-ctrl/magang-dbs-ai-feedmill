<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Sistem Analitik AI Feedmill">
    <meta name="theme-color" content="#0f172a">
    <title>Login - AI Feedmill System</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { --theme-color: #3b82f6; --text-main: #f8fafc; --text-secondary: #94a3b8; }
        body { margin: 0; font-family: 'Inter', sans-serif; color: var(--text-main); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; opacity: 0; transition: opacity 0.5s ease-in; }
        body.loaded { opacity: 1; }
        .bg-animation { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #020617, #0f172a, #1e1b4b, #0f172a); background-size: 400% 400%; animation: gradientBG 20s ease infinite; z-index: -1; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .login-card {
            background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 40px; width: 400px; backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center;
        }
        .login-card i.logo { font-size: 50px; color: var(--theme-color); margin-bottom: 10px; }
        .login-card h2 { margin: 0 0 5px 0; font-size: 24px; font-weight: 700; }
        .login-card p { margin: 0 0 30px 0; color: var(--text-secondary); font-size: 14px; }
        
        .input-group { margin-bottom: 20px; text-align: left; position: relative; }
        .input-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600;}
        .input-group input {
            width: 100%; padding: 12px 15px 12px 40px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0, 0, 0, 0.3);
            color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 14px;
            outline: none; transition: border 0.3s; box-sizing: border-box;
        }
        .input-group input:focus { border-color: var(--theme-color); }
        .input-group i { position: absolute; left: 15px; top: 38px; color: var(--text-secondary); font-size: 18px; }
        
        .btn-login {
            background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff;
            border: none; padding: 15px; border-radius: 10px; font-size: 15px;
            font-weight: 600; cursor: pointer; transition: all 0.3s; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6); }
        
        .error-msg { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #ef4444; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: {% if error %}block{% else %}none{% endif %}; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="login-card">
        <i class="ph-fill ph-aperture logo"></i>
        <h2>Enterprise Feedmill</h2>
        <p>Sistem Perhitungan Karung AI Terintegrasi</p>
        
        <div class="error-msg">
            <i class="ph-bold ph-warning-circle"></i> {{ error }}
        </div>

        <form method="POST" action="/login">
            <div class="input-group">
                <label>Username</label>
                <i class="ph-bold ph-user"></i>
                <input type="text" name="username" placeholder="Masukkan username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <i class="ph-bold ph-lock-key"></i>
                <input type="password" id="pwd-input" name="password" placeholder="Masukkan password" required>
                <i class="ph-bold ph-eye" id="toggle-pwd" style="left: auto; right: 15px; cursor: pointer; pointer-events: auto;"></i>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 13px; color: var(--text-secondary);">
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="checkbox" name="remember" style="width: auto; margin: 0;"> Ingat Saya
                </label>
            </div>
            <button type="submit" class="btn-login">Masuk ke Sistem <i class="ph-bold ph-sign-in"></i></button>
        </form>
    </div>
    <script>
        window.onload = () => document.body.classList.add('loaded');
        
        document.getElementById('toggle-pwd').addEventListener('click', function() {
            const pwdInput = document.getElementById('pwd-input');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                this.classList.remove('ph-eye');
                this.classList.add('ph-eye-slash');
            } else {
                pwdInput.type = 'password';
                this.classList.remove('ph-eye-slash');
                this.classList.add('ph-eye');
            }
        });
    </script>
</body>
</html>
